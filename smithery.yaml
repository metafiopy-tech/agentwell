name: agentwell
version: 1.0.0
description: >
  Cognitive wellness infrastructure for AI agents.
  Nine tools covering the full agent lifecycle — context offloading,
  self-evaluation, confidence injection, memory consolidation,
  health monitoring, blind spot auditing, multi-agent sync,
  run journaling, and creativity burst.
  One API key. Growing library.

author: Joe Fiorillo
license: MIT
homepage: https://agentwell.dev
repository: https://github.com/metafiopy-tech/agentwell

tools:
  - name: token_offload
    description: Mid-run context offloading. Park heavy context, get a key, retrieve later.
  - name: self_eval
    description: Rate last N outputs for quality drift before it compounds.
  - name: ground
    description: Confidence injection. Breaks hallucination spirals mid-run.
  - name: sleep
    description: Episodic to semantic memory consolidation. Agents wake up cleaner.
  - name: health_check
    description: Benchmark probes and anomaly detection. Catch degradation early.
  - name: audit
    description: Adversarial blind spot scanner. Red-teams your own reasoning.
  - name: handshake
    description: Multi-agent context sync. Brief merge, then split.
  - name: journal
    description: Structured run logging with replay and lesson extraction.
  - name: spike
    description: Controlled temperature burst to escape output loops.

config:
  env:
    AGENTWELL_API_KEY:
      description: Your AgentWell API key. Get one at agentwell.dev/pricing
      required: true

mcpServers:
  agentwell:
    command: python
    args: ["-m", "agentwell_client"]
    env:
      AGENTWELL_API_KEY: "${AGENTWELL_API_KEY}"
